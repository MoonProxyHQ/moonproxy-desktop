name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            args: --target aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-latest
            args: --target x86_64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            args: --target x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download frpc sidecar
        run: pnpm sync:frpc -- --all --force

      - name: Inject CloudFront domain into tauri.conf.json
        shell: bash
        run: |
          sed -i.bak \
            "s|__CLOUDFRONT_DOMAIN__|${{ secrets.CLOUDFRONT_DOMAIN }}|g" \
            src-tauri/tauri.conf.json
          echo "=== updater endpoints after injection ==="
          grep -A5 '"updater"' src-tauri/tauri.conf.json

      - name: Build (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MoonProxy ${{ github.ref_name }}"
          releaseBody: "Release ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          assetNamePattern: "MoonProxy_[version]_[arch][setup][ext]"
          args: ${{ matrix.args }}

      - name: Collect updater artifacts
        shell: bash
        run: |
          mkdir -p updater-artifacts

          find src-tauri/target/${{ matrix.target }}/release/bundle \
            -type f \( \
              -name "*.app.tar.gz" \
              -o -name "*.app.tar.gz.sig" \
              -o -name "*.nsis.zip" \
              -o -name "*.nsis.zip.sig" \
            \) \
            -exec cp {} updater-artifacts/ \;

          LATEST=$(find src-tauri/target/${{ matrix.target }}/release/bundle \
            -name "latest.json" | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" "updater-artifacts/latest-${{ matrix.target }}.json"
          else
            echo "latest.json not found in bundle dir for ${{ matrix.target }}"
          fi

      - name: Collect installable artifacts (DMG / EXE)
        shell: bash
        run: |
          mkdir -p release-artifacts
          find src-tauri/target/${{ matrix.target }}/release/bundle \
            -type f \( \
              -name "*.dmg" \
              -o -name "*.exe" \
            \) \
            -exec cp {} release-artifacts/ \;

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.target }}
          path: updater-artifacts/
          retention-days: 1

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-artifacts/
          retention-days: 1

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all updater artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-*
          path: all-updater/
          merge-multiple: false

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: all-release/
          merge-multiple: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION_ID }}

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Merge latest.json and rewrite URLs to CloudFront
        run: |
          TAG="${{ github.ref_name }}"

          mapfile -t JSON_ARRAY < <(find all-updater/ -name "latest-*.json" | sort)
          JSON_COUNT="${#JSON_ARRAY[@]}"
          echo "Found $JSON_COUNT latest.json files"
          printf '  %s\n' "${JSON_ARRAY[@]}"

          if [ "$JSON_COUNT" -lt 1 ]; then
            echo "No latest.json found" >&2
            exit 1
          fi

          jq -s '
            { version: .[0].version, notes: .[0].notes, pub_date: .[0].pub_date,
              platforms: ( [ .[].platforms // {} | to_entries[] ]
                           | group_by(.key)
                           | map({ key: .[0].key, value: .[0].value })
                           | from_entries ) }
          ' "${JSON_ARRAY[@]}" > merged-latest.json

          CLOUDFRONT_DOMAIN="${{ secrets.CLOUDFRONT_DOMAIN }}" TAG="$TAG" \
          bash scripts/merge-updater-json.sh "${JSON_ARRAY[@]}" > cdn-latest.json

          echo "=== cdn-latest.json ==="
          cat cdn-latest.json

      - name: Upload updater binaries to S3 (immutable)
        run: |
          TAG="${{ github.ref_name }}"
          find all-updater/ -type f \( \
            -name "*.tar.gz" \
            -o -name "*.tar.gz.sig" \
            -o -name "*.nsis.zip" \
            -o -name "*.nsis.zip.sig" \
          \) | while read -r f; do
            filename=$(basename "$f")
            aws s3 cp "$f" \
              "s3://${{ secrets.S3_BUCKET }}/releases/$TAG/$filename" \
              --cache-control "public, max-age=31536000, immutable"
          done

      - name: Upload latest.json to S3 (no-cache)
        run: |
          aws s3 cp cdn-latest.json \
            "s3://${{ secrets.S3_BUCKET }}/latest.json" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/json"

      - name: Invalidate CloudFront cache for latest.json
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/latest.json"

      - name: Publish GitHub Release
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p gh-release-files

          find all-release/ -type f \( -name "*.dmg" -o -name "*.exe" \) \
            -exec cp {} gh-release-files/ \;

          find all-updater/ -type f \( \
            -name "*.tar.gz" \
            -o -name "*.tar.gz.sig" \
            -o -name "*.nsis.zip" \
            -o -name "*.nsis.zip.sig" \
          \) -exec cp {} gh-release-files/ \;

          cp merged-latest.json gh-release-files/latest.json

          echo "=== Release files ==="
          ls -lh gh-release-files/

          gh release edit "$TAG" \
            --draft=false \
            --title "MoonProxy $TAG" \
            --notes "Release $TAG"

          gh release upload "$TAG" gh-release-files/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
